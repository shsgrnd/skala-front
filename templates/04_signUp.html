<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header class="section-divider">
            <h2>회원 가입</h2>
            <span>SKALA-Front의 회원가입을 환영합니다.</span>
            <a href="index.html">Home</a>
        </header>

        <form class="signup-form" action="signUpResult.html" method="get">
            <fieldset>
                <legend>계정 정보</legend>
                <p>
                    <label for="userId">아이디 : </label>
                    <input type="text" id="userId" name="userId"pattern="[A-Za-z0-9]{4,12}" title="영문과 숫자만 사용하여 4~12자로 입력하세요." required placeholder="4 - 12자 영문/숫자">
                    <small>*</small>
                </p>
                <p>
                    <label for="userPwd">비밀번호 : </label>
                    <input type="text" id="userPwd" name="userPwd" minlength="8" required placeholder="8자 이상 입력">
                    <small>*</small>
                </p>
                <p>
                    <label for="userEmail">이메일 : </label>
                    <input type="email" id="userEmail" name="userEmail" placeholder="hideonbush@faker.com">
                </p>
            </fieldset>

            <fieldset>
                <legend>개인 프로필 정보</legend>
                <p>
                    <label for="userName">이름 : </label>
                    <input type="text" id="userName" name="userName" required>
                    <small>*</small>
                </p>
                <p>
                    <label for="userBirth">생년월일</label>
                    <input type="date" id="userBirth" name="userBirth">
                </p>
                <p>
                    <label for="phoneNum">전화번호 : </label>
                    <input type="tel" name="phoneNum" id="phoneNum" pattern="010-[0-9]{4}-[0-9]{4}" title="영문과 숫자만 사용하여 4~12자로 입력하세요." placeholder="010-0000-0000">
                </p>
                <p>
                    성별 : 
                    <label><input type="radio" name="gender" value="male">남성</label>
                    <label><input type="radio" name="gender" value="female">여성</label>
                    <label><input type="radio" name="gender" value="none">선택 안함</label>
                </p>
                <p>
                    <label for="area">지역 : </label>
                    <select name="area" id="area">
                        <option value="" disabled selected>--선택--</option>
                        <option value="seoul">서울</option>
                        <option value="gwangju">광주</option>
                        <option value="daegu">대구</option>
                        <option value="daejeon">대전</option>
                        <option value="busan">부산</option>
                        <option value="ulsan">울산</option>
                        <option value="incheon">인천</option>
                    </select>
                </p>
                <p>
                    관심 분야 (중복 선택 가능) : 
                    <br>
                    <label><input type="checkbox" name="interest" value="frontend">웹 프론트 엔드(React, Vue)</label>
                    <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label>
                    <label><input type="checkbox" name="interest" value="devops">클라우드 & 인프라</label>
                    <label><input type="checkbox" name="interest" value="AI">AI</label>
                    <label><input type="checkbox" name="interest" value="fullstack">풀스택</label>
                </p>
                <p>
                    <label for="joinPath">가입 경로 : </label>
                    <select name="joinPath" id="joinPath">
                        <option value="" disabled selected>--선택--</option>
                        <option value="search">인터넷</option>
                        <option value="recommend">지인 추천</option>
                        <option value="adv">광고</option>
                        <option value="etc">기타</option>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>자기소개</legend>
                <p>
                    <label for="intro">본인을 표현하는 한마디</label>
                    <br>
                    <textarea id="intro" name="intro" rows="6" cols="60" placeholder="자기소개를 입력하세요(최대 200자)"></textarea>
                </p>
            </fieldset>

            <br>

            <div align="center">
                <input type="checkbox" name="regAgree" id="regAgree" value="1" required>
                <label for="regAgree">해당 사이트의 규정 및 약관에 동의합니다</label>
            </div>

            <div align="center">
                <input type="submit" class="btn-submit" value="회원가입">
                <input type="reset" class="btn-reset" value="초기화">
            </div>

        </form>

    </div>
    
    
</body>
</html>
