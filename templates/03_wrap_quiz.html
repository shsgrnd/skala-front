<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML · CSS · JavaScript 복습 퀴즈</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../scripts/quiz.js" defer></script>
</head>
<body class="quiz-page">
    <main class="quiz-container">
        <header class="quiz-header">
            <h1>HTML · CSS · JavaScript 복습 퀴즈</h1>
            <p>보기를 클릭하고 학습 내용을 점검해 보세요.</p>
        </header>

        <section class="quiz-card">
            <div class="quiz-meta">
                <p id="quiz-progress">1 / 3</p>
                <p id="quiz-score">점수: 0</p>
            </div>

            <h2 id="quiz-question">문제가 표시됩니다.</h2>
            <div id="quiz-options" class="quiz-options"></div>
            <p id="quiz-result" class="quiz-result" aria-live="polite"></p>

            <button id="next-question" class="quiz-next-button" type="button" disabled>
                다음 문제
            </button>
        </section>

        <a class="quiz-home-link" href="index.html">홈으로 돌아가기</a>
    </main>
</body>
</html>
